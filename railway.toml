[build]
builder = "nixpacks"

[build.nixpacks]
providers = ["python"]

[deploy]
startCommand = "cd Engine/web_backend && uvicorn server:app --host 0.0.0.0 --port ${PORT:-8000} --no-access-log"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
