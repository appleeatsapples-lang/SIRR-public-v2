<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>{{TITLE}} · SIRR</title>
<meta name="robots" content="noindex" />
<style>
  :root {
    --bg:     #f5f1ea;
    --bg2:    #ebe4d5;
    --text:   #1a1814;
    --text-d: #8a8178;
    --text-f: #b5ac9f;
    --amber:  #8a6f3d;
    --serif:  'Newsreader', 'Instrument Serif', Georgia, serif;
    --sans:   -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --mono:   ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body {
    min-height: 100vh;
    font-family: var(--serif);
    font-weight: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .frame {
    max-width: 560px;
    width: 100%;
    text-align: center;
  }
  .mark {
    font-family: var(--serif);
    font-size: 48px;
    font-weight: 300;
    letter-spacing: 0.02em;
    color: var(--text);
    margin: 0 0 48px;
    display: inline-block;
    border-bottom: 1px solid var(--text-f);
    padding: 0 20px 8px;
  }
  .code {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-d);
    text-transform: uppercase;
    margin: 0 0 12px;
  }
  h1 {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 300;
    line-height: 1.2;
    margin: 0 0 20px;
    color: var(--text);
  }
  p.detail {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 300;
    line-height: 1.55;
    color: var(--text-d);
    max-width: 440px;
    margin: 0 auto 36px;
  }
  .actions {
    margin-top: 32px;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .actions a {
    display: inline-block;
    padding: 10px 22px;
    font-family: var(--sans);
    font-size: 13px;
    letter-spacing: 0.05em;
    color: var(--text);
    text-decoration: none;
    border: 1px solid var(--text-f);
    border-radius: 3px;
    transition: border-color 0.15s, color 0.15s;
  }
  .actions a:hover {
    border-color: var(--text);
    color: var(--text);
  }
  .actions a.primary {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--bg);
  }
  .actions a.primary:hover {
    background: var(--text);
    border-color: var(--text);
    color: var(--bg);
  }
  .foot {
    margin-top: 64px;
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-f);
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="mark">سِرّ</div>
    <p class="code">{{CODE}}</p>
    <h1>{{HEADLINE}}</h1>
    <p class="detail">{{DETAIL}}</p>
    <div class="actions">{{ACTIONS}}</div>
    <div class="foot">SIRR · a mirror, not a forecast</div>
  </div>
</body>
</html>
